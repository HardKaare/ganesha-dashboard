<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ganesha Lab - dashboard</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --line:#2b3444;
    --ink:#e6edf3; --dim:#8b949e; --green:#3fb950; --amber:#d29922; --red:#f85149;
    --blue:#58a6ff; --violet:#bc8cff; --bar:#30465f;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:1180px;margin:0 auto;padding:24px}
  header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px}
  h1{font-size:20px;margin:0;letter-spacing:.2px}
  h1 span{color:var(--violet)}
  .sub{color:var(--dim);font-size:12px}
  .statusbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  .live-tag{display:inline-flex;align-items:center;gap:6px;background:#0f2417;color:var(--green);border:1px solid #1f5130;
    border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600}
  .live-tag .pulse{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block}
  .btn{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:6px;
    padding:4px 10px;font-size:12px;cursor:pointer}
  .btn:hover{border-color:var(--dim)}
  .stripwrap{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px}
  @media(max-width:820px){.stripwrap{grid-template-columns:repeat(2,1fr)}}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
  .stat .n{font-size:26px;font-weight:700;letter-spacing:-.5px}
  .stat .l{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px}
  .c6{grid-column:span 6}.c12{grid-column:span 12}.c4{grid-column:span 4}.c8{grid-column:span 8}
  @media(max-width:820px){.c6,.c4,.c8{grid-column:span 12}}
  .card h2{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);
    margin:0 0 14px;font-weight:600}
  .row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #20262f}
  .row:last-child{border-bottom:none}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px}
  .ok{background:var(--green)}.warnd{background:var(--amber)}.bad{background:var(--red)}
  .muted{color:var(--dim)}
  .big{font-size:30px;font-weight:700;letter-spacing:-.5px}
  .unit{font-size:13px;color:var(--dim);font-weight:400}
  .barwrap{height:7px;background:#0d1117;border-radius:4px;overflow:hidden;margin-top:4px}
  .bar{height:100%;background:var(--bar);border-radius:4px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:right;padding:6px 8px;border-bottom:1px solid #20262f}
  th{color:var(--dim);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  th:first-child,td:first-child{text-align:left}
  td.mono,th.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;color:var(--dim)}
  .badge{font-size:10px;padding:1px 7px;border-radius:20px;font-weight:600}
  .b-leader{background:#132e1a;color:var(--green);border:1px solid #1f5130}
  .b-active{background:#12233b;color:var(--blue);border:1px solid #1f4368}
  .b-arch{background:#26201a;color:var(--dim);border:1px solid #3a3128}
  .b-none{color:var(--dim)}
  .best{color:var(--green);font-weight:600}
  .nm{font-weight:600}
  .qgrid{display:flex;flex-direction:column;gap:10px}
  .qrow{display:grid;grid-template-columns:64px 1fr 116px;align-items:center;gap:10px}
  .qname{font-size:12px}
  .qval{font-size:12px;color:var(--dim);text-align:right}
  .contam{display:flex;gap:20px;margin-top:14px;padding-top:12px;border-top:1px solid #20262f;flex-wrap:wrap}
  .contam div{font-size:12px;color:var(--dim)}
  .contam b{display:block;color:var(--ink);font-size:18px;font-weight:700}
  .srcclass{margin-bottom:12px}
  .srcclass h3{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--violet);margin:0 0 6px;font-weight:600}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:3px 10px;font-size:12px}
  .chip b{color:var(--ink)}.chip span{color:var(--dim)}
  svg text{fill:var(--ink);font-family:ui-monospace,Menlo,monospace}
  .foot{color:var(--dim);font-size:11px;margin-top:22px;line-height:1.7}
  /* ---- login / status overlay ---- */
  .overlay{position:fixed;inset:0;background:rgba(13,17,23,.92);display:flex;align-items:center;
    justify-content:center;z-index:50}
  .overlay.hidden{display:none}
  .login{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:28px 26px;
    width:min(380px,92vw);text-align:center}
  .login h2{margin:0 0 4px;font-size:18px;text-transform:none;letter-spacing:0;color:var(--ink)}
  .login .lead{color:var(--dim);font-size:13px;margin-bottom:18px}
  .login input{width:100%;background:#0d1117;border:1px solid var(--line);border-radius:7px;color:var(--ink);
    padding:10px 12px;font-size:14px;margin-bottom:12px}
  .login input:focus{outline:none;border-color:var(--blue)}
  .login .go{width:100%;background:var(--blue);color:#04121f;border:none;border-radius:7px;padding:10px;
    font-size:14px;font-weight:600;cursor:pointer}
  .login .go:disabled{opacity:.6;cursor:default}
  .login .msg{font-size:12px;margin-top:14px;min-height:16px}
  .login .msg.err{color:var(--red)}.login .msg.okmsg{color:var(--green)}
  .login .brand{color:var(--violet);font-weight:700;letter-spacing:.2px}
</style>
</head>
<body>

<!-- ===== auth / status overlay ===== -->
<div class="overlay" id="overlay">
  <div class="login">
    <h2>Ganesha <span class="brand">Lab</span></h2>
    <div class="lead" id="loginLead">Log ind for at se dashboardet.</div>
    <div id="loginForm">
      <input type="email" id="email" placeholder="din@email.dk" autocomplete="email">
      <button class="go" id="sendLink">Send login-kode</button>
    </div>
    <div id="codeForm" style="display:none">
      <input type="text" id="code" inputmode="numeric" autocomplete="one-time-code" placeholder="6-cifret kode fra mailen" maxlength="8">
      <button class="go" id="verifyCode">Log ind</button>
      <button class="go" id="resend" style="background:transparent;color:var(--dim);border:1px solid var(--line);margin-top:8px">Send ny kode</button>
    </div>
    <div class="msg" id="loginMsg"></div>
  </div>
</div>

<!-- ===== dashboard ===== -->
<div class="wrap" id="dash" style="display:none">
  <header>
    <h1>Ganesha <span>Lab</span></h1>
    <div class="sub" id="stamp"></div>
  </header>
  <div class="statusbar">
    <span class="live-tag"><span class="pulse"></span>LIVE</span>
    <span class="sub" id="freshness"></span>
    <button class="btn" id="reload">Genindlaes</button>
    <button class="btn" id="logout">Log ud</button>
  </div>

  <div class="stripwrap" id="strip"></div>

  <div class="grid">
    <div class="card c6">
      <h2>Loop-sundhed &amp; freshness</h2>
      <div id="loops"></div>
    </div>

    <div class="card c6">
      <h2>Spend &amp; budget</h2>
      <div class="big" id="spendtoday"></div>
      <div id="spendtrend" style="margin-top:14px"></div>
    </div>

    <div class="card c6">
      <h2>Opgaver &amp; kvoter</h2>
      <div class="qgrid" id="quotas"></div>
      <div class="contam" id="contam"></div>
    </div>

    <div class="card c6">
      <h2>Variant-leaderboard</h2>
      <table id="lb"><thead><tr>
        <th>variant</th><th>val Brier</th><th>n</th><th>holdout</th><th>status</th>
      </tr></thead><tbody></tbody></table>
    </div>

    <div class="card c12">
      <h2>Datakilder</h2>
      <div id="sources"></div>
    </div>

    <div class="card c12">
      <h2>Mutations- &amp; generationstrae (fylogeni)</h2>
      <div id="tree"></div>
    </div>
  </div>

  <div class="foot" id="foot"></div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2.45.4";

// ---- config (alt her er offentligt: publishable key + endpoints) ----
const SB_URL  = "https://vdfakcuwexyvdriqlexr.supabase.co";
const SB_KEY  = "sb_publishable_SyaLGFVn6cqkcMhNEalx9Q_95vM-dtd"; // publishable (ikke hemmelig)
const DATA_FN = SB_URL + "/functions/v1/ganesha-dashboard-data";

const client = createClient(SB_URL, SB_KEY, {
  auth: { detectSessionInUrl: true, persistSession: true, autoRefreshToken: true },
});

const $ = (s) => document.querySelector(s);
const overlay = $("#overlay"), dash = $("#dash");

function showLogin(lead){
  overlay.classList.remove("hidden");
  dash.style.display = "none";
  const lf = $("#loginForm"), cf = $("#codeForm");
  if (lf && cf) { lf.style.display = "block"; cf.style.display = "none"; }
  if (lead) $("#loginLead").textContent = lead;
}
function showDash(){ overlay.classList.add("hidden"); dash.style.display = "block"; }
function setMsg(t, cls){ const m = $("#loginMsg"); m.textContent = t || ""; m.className = "msg" + (cls ? " " + cls : ""); }

// ---- email OTP login (indtast kode; magic-link i mailen virker ogsaa) ----
async function sendCode(){
  const email = $("#email").value.trim();
  if (!email) { setMsg("Indtast din email.", "err"); return; }
  $("#sendLink").disabled = true;
  setMsg("Sender login-kode ...");
  const { error } = await client.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin + window.location.pathname },
  });
  $("#sendLink").disabled = false;
  if (error) { setMsg(error.message || "Kunne ikke sende kode.", "err"); return; }
  $("#loginForm").style.display = "none";
  $("#codeForm").style.display = "block";
  $("#code").focus();
  setMsg("Tjek din mail. Indtast koden herunder (eller klik linket i mailen).", "okmsg");
}
async function verifyCode(){
  const email = $("#email").value.trim();
  const token = $("#code").value.trim().replace(/\s+/g, "");
  if (!token) { setMsg("Indtast koden fra mailen.", "err"); return; }
  $("#verifyCode").disabled = true;
  setMsg("Bekraefter kode ...");
  const { error } = await client.auth.verifyOtp({ email, token, type: "email" });
  $("#verifyCode").disabled = false;
  if (error) { setMsg(error.message || "Forkert eller udloebet kode.", "err"); return; }
  setMsg("Logget ind ...", "okmsg");
  // onAuthStateChange -> loadData() overtager herfra
}
$("#sendLink").addEventListener("click", sendCode);
$("#verifyCode").addEventListener("click", verifyCode);
$("#resend").addEventListener("click", sendCode);
$("#email").addEventListener("keydown", (e) => { if (e.key === "Enter") sendCode(); });
$("#code").addEventListener("keydown", (e) => { if (e.key === "Enter") verifyCode(); });

$("#logout").addEventListener("click", async () => { await client.auth.signOut(); showLogin("Du er logget ud."); });
$("#reload").addEventListener("click", () => loadData());

// ---- data + boot ----
async function loadData(){
  const { data: { session } } = await client.auth.getSession();
  if (!session) { showLogin(); return; }
  let res;
  try {
    res = await fetch(DATA_FN, { headers: { Authorization: "Bearer " + session.access_token, apikey: SB_KEY } });
  } catch (e) { showLogin("Netvaerksfejl - proev igen."); return; }

  if (res.status === 401) { await client.auth.signOut(); showLogin("Din session udloeb - log ind igen."); return; }
  if (res.status === 403) { showLogin("Din bruger har ikke adgang til dette dashboard."); return; }
  const j = await res.json().catch(() => ({}));
  if (res.status === 404 || (j && j.error === "no snapshot yet")) {
    showDash();
    $("#stamp").textContent = "afventer foerste snapshot";
    $("#freshness").textContent = "Ingen snapshot modtaget fra agent-lab endnu.";
    return;
  }
  if (!j || !j.ok || !j.payload) { showLogin("Kunne ikke hente data."); return; }

  showDash();
  render(j.payload);
  const built = j.built_at ? j.built_at.replace("T", " ").replace(/\..*/, "").replace("Z", "") : "?";
  const recv  = j.received_at ? new Date(j.received_at).toLocaleString("da-DK") : "?";
  $("#stamp").textContent = "snapshot " + built + " UTC";
  $("#freshness").textContent = "modtaget " + recv;
}

// Handle the magic-link return, then load.
client.auth.onAuthStateChange((_evt, session) => { if (session) loadData(); });
loadData();

// =========================================================================
// RENDER  (Fathers oprindelige render-logik, uaendret - tager payload som S)
// =========================================================================
const HOUSES=["Shiva","Vishnu","Brahma","Durga","Krishna","Lakshmi","Saraswati","Hanuman",
  "Indra","Agni","Surya","Varuna","Vayu","Chandra","Kartikeya","Kubera"];
const EPITHETS=["Anumana","Prajna","Buddhi","Viveka","Medha","Tarka","Sambhavana","Vidya",
  "Jnana","Dhi","Smriti","Nishchaya","Pratyaksha","Bodha","Vichara","Yukti","Pramana",
  "Drishti","Nirnaya","Upamana","Tejas","Ojas","Dhriti","Shraddha","Chetana","Manas"];
function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;}

function render(S){
  const byId={}; S.tree.forEach(n=>byId[n.id]=n);
  function gen1Ancestor(n){let cur=n;while(cur&&cur.gen>1&&cur.parent&&byId[cur.parent])cur=byId[cur.parent];return cur;}
  function house(n){ if(n.gen===0)return "Adi"; const a=gen1Ancestor(n); return HOUSES[hashStr(a.id)%HOUSES.length]; }
  function nameOf(id){ const n=byId[id]; if(!n)return id;
    const ep=EPITHETS[hashStr(id)%EPITHETS.length];
    return (n.gen===0? "Adi": house(n))+" "+ep; }

  // ---- headline strip ----
  const T=S.totals;
  $("#strip").innerHTML=[
    ["Spoergsmaal stillet",T.questions.toLocaleString('da-DK')],
    ["Forecasts koert",T.forecasts.toLocaleString('da-DK')],
    ["Afgjort (facit kendt)",T.resolved.toLocaleString('da-DK')],
    ["Scoringer",T.scored.toLocaleString('da-DK')]
  ].map(([l,n])=>`<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");

  // ---- loops ----
  function ageStr(m){ if(m<60)return m+" min"; const h=(m/60); return h<48?h.toFixed(h<10?1:0)+" t":Math.round(h/24)+" dage"; }
  $("#loops").innerHTML = S.loops.health.map(l=>{
    const cls = l.age_min>1440?"warnd":"ok";
    return `<div class="row"><span><span class="dot ${l.ok?cls:'bad'}"></span>${l.loop}</span>
      <span class="muted">${ageStr(l.age_min)}</span></div>`;
  }).join("") + `<div class="row"><span class="muted">nyeste opgave</span>
    <span class="muted">${S.loops.tasks_freshness.age_h} t &middot; ${S.loops.tasks_freshness.total} tasks</span></div>`;

  // ---- spend ----
  $("#spendtoday").innerHTML = `$${S.spend.today_to_date_usd.toFixed(2)} <span class="unit">/ $${S.spend.daily_cap_usd} loft i dag</span>`;
  const mx = S.spend.daily_cap_usd;
  $("#spendtrend").innerHTML = S.spend.daily.map(d=>`
    <div class="row" style="border:none;padding:3px 0">
      <span class="muted" style="width:56px">${d.d}</span>
      <span style="flex:1;margin:0 10px"><span class="barwrap"><span class="bar" style="width:${(d.usd/mx*100).toFixed(1)}%"></span></span></span>
      <span class="muted" style="width:52px;text-align:right">$${d.usd.toFixed(2)}</span>
    </div>`).join("");

  // ---- quotas ----
  $("#quotas").innerHTML = S.tasks_quotas.classes.map(c=>{
    const pct=(c.share/c.max_share*100);
    const col = c.share>=c.max_share ? (c.gates?"var(--red)":"var(--amber)") : (pct>=80?"var(--amber)":"var(--bar)");
    const note = c.gates? "" : " &middot; gater ikke";
    return `<div class="qrow">
      <span class="qname">${c.class}</span>
      <span class="barwrap" style="height:9px"><span class="bar" style="width:${Math.min(100,pct).toFixed(0)}%;background:${col}"></span></span>
      <span class="qval">${(c.share*100).toFixed(1)}% / ${(c.max_share*100).toFixed(0)}%${note}</span>
    </div>`;
  }).join("");
  const ct=S.tasks_quotas.contamination;
  $("#contam").innerHTML = `
    <div><b>${ct.excluded_total}</b>ekskluderet</div>
    <div><b>${ct.gated_hard}</b>haardt-gated</div>
    <div><b>${ct.avg_contam}</b>gns. kontaminering</div>
    <div><b>${ct.total}</b>tasks i alt</div>`;

  // ---- data sources (grupperet efter klasse) ----
  (function(){
    const order=["markets","econ","geo","space","tech","health","synthetic"];
    const byClass={}; S.data_sources.forEach(s=>{(byClass[s.class]=byClass[s.class]||[]).push(s)});
    $("#sources").innerHTML = order.filter(c=>byClass[c]).map(c=>{
      const chips = byClass[c].sort((a,b)=>b.n-a.n).map(s=>`<span class="chip"><b>${s.name}</b> <span>${s.n}</span></span>`).join("");
      return `<div class="srcclass"><h3>${c}</h3><div class="chips">${chips}</div></div>`;
    }).join("");
  })();

  // ---- leaderboard (med navne) ----
  const bestVal = Math.min(...S.leaderboard.map(v=>v.val));
  $("#lb tbody").innerHTML = S.leaderboard.map(v=>{
    const badge = v.status==="l1_leader"?`<span class="badge b-leader">L1-leder</span>`
      : v.status==="active"?`<span class="badge b-active">aktiv</span>`
      : v.status==="archived"?`<span class="badge b-arch">arkiveret</span>`
      : `<span class="b-none">-</span>`;
    return `<tr>
      <td><span class="nm">${nameOf(v.id)}</span> <span class="mono">${v.id}</span></td>
      <td class="${v.val===bestVal?'best':''}">${v.val.toFixed(4)}</td>
      <td class="muted">${v.val_n||"-"}</td>
      <td>${v.hold!=null?`<span class="best">${v.hold.toFixed(4)}</span> <span class="muted">(${v.hold_n})</span>`:'<span class="muted">-</span>'}</td>
      <td>${badge}</td></tr>`;
  }).join("");

  // ---- tree (fylogeni, layered efter generation, med navne) ----
  (function(){
    const gens={}; S.tree.forEach(n=>{(gens[n.gen]=gens[n.gen]||[]).push(n)});
    const genKeys=Object.keys(gens).map(Number).sort((a,b)=>a-b);
    const W=1120, colW=W/genKeys.length, rowH=52, padTop=26;
    const maxRows=Math.max(...genKeys.map(g=>gens[g].length));
    const H=padTop+maxRows*rowH+10;
    const pos={};
    genKeys.forEach((g)=>{
      const nodes=gens[g]; const gap=H/(nodes.length+1);
      nodes.forEach((n,i)=>{ pos[n.id]={x:colW*g+colW*0.5, y:padTop+gap*(i+1)-10}; });
    });
    const scoreCol=(v)=> v<0.15?"#3fb950": v<0.22?"#7bc96f": v<0.32?"#d29922":"#f85149";
    let edges="", nodes="";
    S.tree.forEach(n=>{
      const p=pos[n.id];
      if(n.parent&&pos[n.parent]){const q=pos[n.parent];
        edges+=`<path d="M${q.x+52} ${q.y} C ${(q.x+p.x)/2} ${q.y}, ${(q.x+p.x)/2} ${p.y}, ${p.x-52} ${p.y}" stroke="#2b3444" fill="none" stroke-width="1.4"/>`;}
    });
    S.tree.forEach(n=>{
      const p=pos[n.id]; const ring = n.status==="l1_leader"?"#3fb950": n.status==="active"?"#58a6ff": n.status==="archived"?"#3a3128":"#2b3444";
      const kmark = n.kind==="random"?" ~":n.kind==="genesis"?" *":"";
      const nm = nameOf(n.id);
      nodes+=`<g>
        <rect x="${p.x-52}" y="${p.y-16}" rx="7" width="104" height="34" fill="#1c2230" stroke="${ring}" stroke-width="${n.status?'1.8':'1'}"/>
        <circle cx="${p.x-40}" cy="${p.y}" r="4.5" fill="${scoreCol(n.val)}"/>
        <text x="${p.x-30}" y="${p.y-3}" font-size="10.5" font-weight="600">${nm}</text>
        <text x="${p.x-30}" y="${p.y+9}" font-size="8.5" fill="#8b949e">g${n.gen} ${n.kind}${kmark} &middot; ${n.val.toFixed(3)}</text>
      </g>`;
    });
    let labels="";
    genKeys.forEach(g=>{ const x=colW*g+colW*0.5; labels+=`<text x="${x}" y="14" font-size="10" fill="#8b949e" text-anchor="middle">generation ${g}</text>`; });
    $("#tree").innerHTML=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible">${labels}${edges}${nodes}</svg>
      <div class="muted" style="font-size:11px;margin-top:8px">Navn = hus (slaegtsgren) + sanskrit-erkendelsesord, afledt af variant-id. Prik = validerings-Brier (groen=god -> roed). Ramme: groen=L1-leder, blaa=aktiv, graa=arkiveret. "~"=random-baseline, "*"=genesis (Adi).</div>`;
  })();

  $("#foot").innerHTML = `Kilde: <b>referee.dashboard_snapshot</b> (saniteret aggregat-snapshot, agent-lab), pushet til Mad Butler og serveret bag chaos-auth. `+
